spring:
  application:
    name: mockworker
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mockworker?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:mockworker}
    password: ${DB_PASSWORD:mockworker}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  sql:
    init:
      # shedlock 테이블 생성 (JPA로 관리되지 않으므로 별도 스크립트로 생성)
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

# scheduling.enabled: false 로 설정하면 이 인스턴스의 스케줄러가 비활성화됨.
# 멀티 인스턴스 환경에서 특정 인스턴스에서만 스케줄러를 실행할 때 사용.
scheduling:
  enabled: ${SCHEDULING_ENABLED:true}

resilience4j:
  circuitbreaker:
    instances:
      mock-worker:
        # 최근 10번의 호출 결과를 기준으로 실패율을 측정 (count-based sliding window)
        sliding-window-size: 10
        # 최소 5번은 호출해야 실패율 계산 시작 (초기 소수 오류로 서킷 오픈 방지)
        minimum-number-of-calls: 5
        # 실패율 50% 이상이면 OPEN 전이
        failure-rate-threshold: 50
        # 느린 응답(5초 초과)도 실패로 집계
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        # OPEN 후 30초 대기, HALF_OPEN 으로 전이
        wait-duration-in-open-state: 30s
        # HALF_OPEN 에서 3번 호출 후 성공/실패 재판정
        permitted-number-of-calls-in-half-open-state: 3
        # 서킷 OPEN 시 즉시 예외 발생 (대기 없음)
        automatic-transition-from-open-to-half-open-enabled: true

mock-worker:
  base-url: ${MOCK_WORKER_BASE_URL:https://dev.realteeth.ai/mock}
  candidate-name: ${MOCK_WORKER_CANDIDATE_NAME:candidate}
  email: ${MOCK_WORKER_EMAIL:candidate@example.com}
  api-key: ${MOCK_WORKER_API_KEY:}
  connect-timeout: 2s
  read-timeout: 5s
  submit:
    max-attempts: 5
    initial-backoff: 1s
    max-backoff: 30s
    scheduler-delay-ms: 1000
  poll:
    initial-interval: 2s
    max-interval: 15s
    deadline: 10m
    scheduler-delay-ms: 1000
