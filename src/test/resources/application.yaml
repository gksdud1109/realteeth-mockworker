scheduling:
  enabled: false   # 테스트에서 ShedLock 락 획득 없이 스케줄러 메서드를 직접 호출

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

mock-worker:
  base-url: https://mock.example.com
  candidate-name: test
  email: test@example.com
  api-key:
  connect-timeout: 2s
  read-timeout: 5s
  submit:
    max-attempts: 3
    initial-backoff: 100ms
    max-backoff: 1s
    scheduler-delay-ms: 9999999
  poll:
    initial-interval: 100ms
    max-interval: 1s
    deadline: 10m
    scheduler-delay-ms: 9999999
